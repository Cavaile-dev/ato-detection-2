<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database - LUXE Security</title>
    <meta name="description" content="Database Manager">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
    <style>
        .db-container {
            margin-top: 32px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }
        .db-table-wrapper {
            overflow-x: auto;
        }
        .db-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }
        .db-table th, .db-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .db-table th {
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        .db-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .db-table td.mono {
            font-family: monospace;
            color: var(--text-muted);
        }
        .btn-delete {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            transition: all var(--transition-fast);
        }
        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <a href="/shop" class="nav-brand"><span>◆</span> LUXE</a>
        <div class="nav-actions">
            <a href="/shop" class="btn btn-ghost btn-sm">Shop</a>
            <a href="/wallet" class="btn btn-ghost btn-sm">Wallet</a>
            <a href="/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
            <a href="/database" class="btn btn-ghost btn-sm" style="color:var(--text-primary);">Database</a>
            <button class="cart-btn" onclick="window.location.href='/cart'">
                🛒 Cart <span id="cartBadge" class="cart-badge"></span>
            </button>
            <div class="nav-user">
                <span id="navUsername" class="nav-user-name"></span>
                <button id="logoutBtn" class="btn btn-ghost btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <!-- Header -->
        <div class="dash-header fade-up">
            <div>
                <h1 class="dash-title">Database Manager</h1>
                <p class="dash-subtitle">Manage Raw Events and Extracted Features</p>
            </div>
            <div class="dash-header-actions">
                <button id="refreshDbBtn" class="btn btn-secondary btn-sm">↻ Refresh</button>
            </div>
        </div>

        <div class="db-container fade-up fade-up-delay-1">
            <div style="margin-bottom: 16px;">
                <input type="text" id="dbSearch" class="form-control" placeholder="Search sessions by User, ID, or Risk Level..." style="max-width: 400px;">
            </div>
            <div class="db-table-wrapper">
                <table class="db-table">
                    <thead>
                        <tr>
                            <th>Session ID</th>
                            <th>User</th>
                            <th>Start Time</th>
                            <th>Events</th>
                            <th>Status</th>
                            <th>Risk Level</th>
                            <th>Score</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dbTableBody">
                        <tr>
                            <td colspan="7" class="empty-state">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <!-- Modal for Session Details -->
    <div id="detailModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="modal-content" style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 24px; box-shadow: var(--shadow-lg);">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); padding-bottom: 16px; margin-bottom: 16px;">
                <h2 style="margin: 0; font-size: 20px;">Session Details</h2>
                <button id="closeModalBtn" style="background: transparent; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            
            <div id="modalLoading" style="text-align: center; padding: 40px; color: var(--text-muted);">
                Loading details...
            </div>
            
            <div id="modalBody" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                    <div style="background: rgba(255, 255, 255, 0.02); padding: 16px; border-radius: var(--radius-md);">
                        <h3 style="margin-top: 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase;">Overview</h3>
                        <div id="modalOverview" style="font-size: 14px; display: grid; gap: 8px;"></div>
                    </div>
                    <div style="background: rgba(255, 255, 255, 0.02); padding: 16px; border-radius: var(--radius-md);">
                        <h3 style="margin-top: 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase;">Risk Assessment</h3>
                        <div id="modalRisk" style="font-size: 14px; display: grid; gap: 8px;"></div>
                    </div>
                </div>
                
                <h3 style="font-size: 14px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px;">Extracted Features (32 Parameters)</h3>
                <div id="modalFeatures" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; font-size: 13px;"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/logger.js"></script>
    <script src="/static/js/shop-app.js"></script>
    <script src="/static/js/database.js"></script>
</body>
</html>
